<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.css" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-xl p-8 w-[380px]">

<!-- LOGO -->

<div class="text-center mb-6">

<img
src="assets/github-logo.png"
class="w-14 mx-auto"
>

<h1 class="text-xl font-semibold mt-3 text-gray-800">
GitHub Issues Tracker
</h1>

<p class="text-sm text-gray-500">
Sign in to manage your issues
</p>

</div>


<!-- USERNAME -->

<label class="text-sm font-medium text-gray-700">
Username
</label>

<input
id="username"
type="text"
placeholder="Enter Username"
class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-purple-500"
/>

<p class="text-xs text-purple-600 mt-1 mb-4">
Default: admin
</p>


<!-- PASSWORD -->

<label class="text-sm font-medium text-gray-700">
Password
</label>

<input
id="password"
type="password"
placeholder="Enter Password"
class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-purple-500"
/>

<p class="text-xs text-purple-600 mt-1 mb-4">
Default: admin123
</p>


<!-- BUTTON -->

<button
onclick="login()"
class="w-full py-2 rounded-lg text-white font-semibold
bg-[#4A00FF] hover:opacity-90 transition"
>

Sign In

</button>


<!-- DIVIDER -->

<div class="flex items-center gap-2 my-5 text-gray-400 text-sm">

<hr class="flex-1">

OR

<hr class="flex-1">

</div>


<p class="text-center text-sm text-gray-500 mb-2">
Demo Credentials:
</p>


<!-- DEMO BOX -->

<div class="bg-gray-100 rounded-lg p-4 text-center text-sm">

<p><span class="font-semibold">Username:</span> admin</p>

<p><span class="font-semibold">Password:</span> admin123</p>

</div>

</div>


<script src="./script/login.js"></script>


</body>
</html>
