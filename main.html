<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.2/dist/full.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="bg-white min-h-screen">

    <!-- NAVBAR -->
   <div class="navbar bg-[#F5F6F8] px-6 border-b">

<div class="flex-1 flex items-center gap-2 text-lg font-semibold text-gray-800">
<img src="assets/github-logo.png" class="w-6">
GitHub Issues Tracker
</div>

<div class="flex flex-col sm:flex-row items-center gap-3">

<input
id="searchInput"
type="text"
placeholder="Search issues..."
class="w-full sm:w-64 px-3 py-2 bg-white border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#4A00FF]"
>

<button
onclick="searchIssues()"
class="w-full sm:w-auto px-4 py-2 text-white rounded-lg bg-[#4A00FF] hover:bg-[#3b00cc] transition">

+ New Issue

</button>

</div>

</div>
    <!-- some -->

<div class="max-w-8xl mx-auto">
    <!-- TABS -->
    <div class="flex gap-3 p-6">

        <button id="allBtn" onclick="filterIssues('all')" class="btn btn-primary">
            All
        </button>

        <button id="openBtn" onclick="filterIssues('open')" class="btn bg-gray-200 text-gray-600">
            Open
        </button>

        <button id="closedBtn" onclick="filterIssues('closed')" class="btn bg-gray-200 text-gray-600">
            Closed
        </button>

    </div>


    <!-- ISSUE HEADER -->
    <div class="flex items-center justify-between px-6">

        <div class="flex items-center gap-3">

            <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center">
                <img src="assets/Aperture.png" alt="">
            </div>

            <div>
                <h2 class="text-xl font-bold text-black">
                    <span id="issueCount">0</span> Issues
                </h2>

                <p class="text-gray-500 text-sm">
                    Track and manage your project issues
                </p>
            </div>

        </div>

        <div class="flex gap-4 text-sm">

            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                Open
            </div>

            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                Closed
            </div>

        </div>

    </div>


    <!-- SPINNER -->
    <div id="spinner" class="text-center hidden">
        <span class="loading loading-spinner loading-lg"></span>
    </div>


    <!-- ISSUES GRID -->
    <div id="issuesContainer"
         class="grid md:grid-cols-2 lg:grid-cols-4 gap-6 p-6">
    </div>
    </div>


    <!-- MODAL -->
    <dialog id="issue_modal" class="modal">

        <div class="modal-box max-w-2xl bg-gray-50 text-gray-800">

            <!-- TITLE -->
            <h2 id="modalTitle" class="text-2xl font-bold text-gray-900"></h2>

            <!-- STATUS + AUTHOR + DATE -->
            <div class="flex items-center gap-3 mt-3">

                <span id="modalStatus"
                      class="badge bg-emerald-500 text-white border-none">
                </span>

                <span id="modalAuthor"
                      class="text-sm text-gray-500">
                </span>

                <span id="modalDate"
                      class="text-sm text-gray-500">
                </span>

            </div>

            <!-- LABELS -->
            <div id="modalLabels" class="flex gap-2 mt-4"></div>

            <!-- DESCRIPTION -->
            <p id="modalDescription" class="mt-4 text-gray-600"></p>


            <!-- ASSIGNEE + PRIORITY -->
            <div class="bg-gray-200 rounded-lg p-5 mt-6 flex justify-between">

                <div>
                    <p class="text-sm text-gray-500">Assignee:</p>
                    <p id="modalAssignee" class="font-semibold text-gray-800"></p>
                </div>

                <div>
                    <p class="text-sm text-gray-500">Priority:</p>
                    <span id="modalPriority"
                          class="badge bg-red-500 text-white border-none">
                    </span>
                </div>

            </div>


            <!-- CLOSE BUTTON -->
            <div class="modal-action">

                <form method="dialog">
                    <button class="btn bg-indigo-600 hover:bg-indigo-700 text-white border-none">
                        Close
                    </button>
                </form>

            </div>

        </div>

    </dialog>

    <script src="script/issue.js"></script>

</body>
</html>
